# ==========================================
# Trend Syria - Production Nginx Configuration
# ==========================================
# ملف تكوين Nginx للإنتاج - ترند سوريا
# 
# للاستخدام على VPS (130.94.57.227):
# 1. انسخ هذا الملف إلى /etc/nginx/sites-available/trendsyria
# 2. أنشئ symbolic link: ln -s /etc/nginx/sites-available/trendsyria /etc/nginx/sites-enabled/
# 3. اختبر التكوين: nginx -t
# 4. أعد تشغيل Nginx: systemctl reload nginx
# ==========================================

server {
    listen 80;
    listen [::]:80;
    server_name trendsyria.com www.trendsyria.com;  # عدّل حسب الدومين الخاص بك

    root /var/www/trendsyria/build;  # مسار مجلد build للـ React app
    index index.html;

    # ==========================================
    # تحسينات الأداء للإنترنت السوري البطيء
    # ==========================================

    # ضغط Gzip - مُفعّل ومُحسّن
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript 
        application/x-javascript 
        application/json 
        application/xml 
        application/xml+rss 
        application/vnd.ms-fontobject 
        application/x-font-ttf 
        font/opentype 
        image/svg+xml 
        image/x-icon;

    # ==========================================
    # Cache-Control للملفات الثابتة
    # مهم جداً للشبكات البطيئة!
    # ==========================================

    # JavaScript و CSS - تخزين مؤقت طويل (1 سنة) لأن اسماء الملفات تتضمن hash
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # الصور - تخزين مؤقت 30 يوم
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # الخطوط - تخزين مؤقت 1 سنة
    location ~* \.(?:woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ملفات manifest و service worker - تخزين قصير
    location ~* ^/(manifest\.json|sw\.js|service-worker\.js|workbox-.*\.js)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=86400";
    }

    # favicon - تخزين متوسط
    location = /favicon.ico {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ==========================================
    # React Router - SPA Support
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # HTML files - لا تُخزَّن مؤقتاً (للتحديثات الفورية)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # ==========================================
    # API Proxy - توجيه طلبات API للـ Backend
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # API requests - لا تُخزَّن مؤقتاً
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # الأمان
    # ==========================================
    
    # إخفاء إصدار Nginx
    server_tokens off;

    # Headers الأمان
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # منع الوصول لملفات النظام
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

