<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B00">
    <title>ترند سورية - غير متصل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .icon {
            width: 120px;
            height: 120px;
            background: rgba(255, 107, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .icon svg {
            width: 60px;
            height: 60px;
            fill: #FF6B00;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #FF6B00;
        }
        
        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #FF6B00, #ff8533);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.4);
        }
        
        .retry-btn:active {
            transform: translateY(0);
        }
        
        .tips {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .tips h3 {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 15px;
        }
        
        .tips ul {
            list-style: none;
            text-align: right;
        }
        
        .tips li {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tips li::before {
            content: "•";
            color: #FF6B00;
        }
        
        .logo {
            margin-top: 40px;
            opacity: 0.6;
            font-size: 14px;
        }
        
        .logo span {
            color: #FF6B00;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M1.5 4.5L3 6l1.5-1.5M21.5 4.5L20 6l-1.5-1.5M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm-1-12.5v5l4.3 2.5.7-1.2-3.5-2V7.5h-1.5z"/>
                <line x1="2" y1="2" x2="22" y2="22" stroke="#FF6B00" stroke-width="2"/>
            </svg>
        </div>
        
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>يبدو أنك فقدت الاتصال بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>
        
        <button class="retry-btn" onclick="location.reload()">
            🔄 إعادة المحاولة
        </button>
        
        <div class="tips">
            <h3>نصائح سريعة:</h3>
            <ul>
                <li>تأكد من تشغيل WiFi أو بيانات الهاتف</li>
                <li>جرب إعادة تشغيل جهاز الراوتر</li>
                <li>أغلق التطبيق وأعد فتحه</li>
            </ul>
        </div>
        
        <div class="logo">
            <span>ترند</span> سورية
        </div>
    </div>
    
    <script>
        // التحقق التلقائي من الاتصال
        window.addEventListener('online', () => {
            location.reload();
        });
        
        // محاولة إعادة الاتصال كل 10 ثواني
        setInterval(() => {
            if (navigator.onLine) {
                location.reload();
            }
        }, 10000);
    </script>
</body>
</html>
