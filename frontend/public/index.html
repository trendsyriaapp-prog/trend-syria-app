        <!-- Error Handler للأخطاء التي تحدث قبل React -->
        <script>
            window.onerror = function(message, source, lineno, colno, error) {
                console.error('Global Error:', message, source, lineno, colno, error);
                var root = document.getElementById('root');
                if (root && !root.innerHTML.trim()) {
                    root.innerHTML = '<div dir="rtl" style="min-height:100vh;background:#FF6B00;padding:20px;font-family:Arial,sans-serif;color:white;text-align:center;">' +
                        '<div style="font-size:60px;margin:40px 0;">⚠️</div>' +
                        '<h1 style="font-size:20px;margin-bottom:10px;">حدث خطأ في تحميل التطبيق</h1>' +
                        '<p style="font-size:14px;opacity:0.9;margin-bottom:20px;">التقط صورة لهذه الشاشة</p>' +
                        '<div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:16px;text-align:right;margin-bottom:20px;">' +
                        '<div style="font-size:12px;opacity:0.8;margin-bottom:4px;">الخطأ:</div>' +
                        '<div style="font-size:14px;font-family:monospace;word-break:break-word;">' + message + '</div>' +
                        '<div style="font-size:11px;opacity:0.7;margin-top:10px;">الملف: ' + source + '</div>' +
                        '<div style="font-size:11px;opacity:0.7;">السطر: ' + lineno + '</div>' +
                        '</div>' +
                        '<button onclick="location.reload()" style="width:100%;padding:14px;background:white;color:#FF6B00;border:none;border-radius:12px;font-size:16px;font-weight:bold;">🔄 إعادة المحاولة</button>' +
                        '</div>';
                }
                return false;
            };
            
            window.onunhandledrejection = function(event) {
                console.error('Unhandled Promise Rejection:', event.reason);
            };
        </script>
