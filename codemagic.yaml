workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
      - name: Build Android AAB
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - frontend/android/app/build/outputs/bundle/release/*.aab
