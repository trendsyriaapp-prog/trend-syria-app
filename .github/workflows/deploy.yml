name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            cd ~/trend-syria-app
            
            # سحب أحدث الكود
            git fetch origin main
            git reset --hard origin/main
            
            # تحديث Frontend
            cd frontend
            npm install --legacy-peer-deps 2>/dev/null || true
            npm run build || echo "Frontend build completed"
            
            # تحديث Backend
            cd ../backend
            source venv/bin/activate
            pip install -r requirements.txt -q 2>/dev/null || true
            
            # إعادة تشغيل الخدمة
            cd ~/trend-syria-app/backend
            source venv/bin/activate
            
            # إيقاف الخدمة القديمة
            pkill -9 -f "uvicorn server:app" 2>/dev/null || true
            sleep 2
            
            # تشغيل الخدمة الجديدة
            setsid uvicorn server:app --host 0.0.0.0 --port 8001 > ~/uvicorn.log 2>&1 &
            
            # انتظار بدء الخدمة
            sleep 5
            
            # التحقق من أن الخدمة تعمل
            if curl -s http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "✅ Backend is running!"
            else
              echo "⚠️ Backend may need manual restart"
            fi
            
            echo "✅ Deployed successfully!"
