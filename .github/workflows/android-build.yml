name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Clean install
      run: |
        cd frontend
        rm -rf node_modules package-lock.json
        echo "REACT_APP_BACKEND_URL=https://trendsyria.app/api" > .env
        npm install --legacy-peer-deps
        
    - name: Build React App
      run: |
        cd frontend
        export NODE_OPTIONS=--openssl-legacy-provider
        CI=false npm run build
      env:
        CI: false
        GENERATE_SOURCEMAP: false
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/trendsyria-release.keystore
      
    - name: Build Android (Signed)
      run: |
        cd frontend
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/frontend/android/app/trendsyria-release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: frontend/android/app/build/outputs/bundle/release/*.aab
