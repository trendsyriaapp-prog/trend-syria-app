name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: yarn install
    
    - name: Build web app
      run: yarn build
      env:
        REACT_APP_BACKEND_URL: https://shopper-suite.preview.emergentagent.com
        CI: false
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Download Gradle Wrapper
      run: |
        cd android
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.5-bin.zip" > gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew
    
    - name: Build APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon
    
    - name: Build AAB (Release)
      run: |
        cd android
        ./gradlew bundleRelease --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/app-release.aab
