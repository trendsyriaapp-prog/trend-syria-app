name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Clean install
      run: |
        cd frontend
        rm -rf node_modules
        echo "REACT_APP_BACKEND_URL=https://trendsyria.app/api" > .env
        yarn install --frozen-lockfile --network-timeout 100000
        
    - name: Build React App
      run: |
        cd frontend
        CI=false yarn build
      env:
        CI: false
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/release.keystore
        ls -la frontend/android/app/release.keystore
      
    - name: Create keystore.properties
      run: |
        cd frontend/android
        echo "storeFile=release.keystore" > keystore.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
      
    - name: Build Android (Signed)
      run: |
        cd frontend
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease
      env:
        KEYSTORE_FILE: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: frontend/android/app/build/outputs/bundle/release/*.aab
