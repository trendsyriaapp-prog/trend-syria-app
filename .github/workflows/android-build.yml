name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: false
      GENERATE_SOURCEMAP: false
      DISABLE_ESLINT_PLUGIN: true
      REACT_APP_BACKEND_URL: https://trendsyria.app/api
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Create env files
      working-directory: ./frontend
      run: |
        echo "REACT_APP_BACKEND_URL=https://trendsyria.app/api" > .env
        echo "DISABLE_ESLINT_PLUGIN=true" >> .env
        echo "GENERATE_SOURCEMAP=false" >> .env
        echo "CI=false" >> .env
        
    - name: Check package.json scripts
      working-directory: ./frontend
      run: |
        echo "=== package.json scripts ==="
        grep -A5 '"scripts"' package.json
        echo "=== Checking for craco ==="
        grep craco package.json || echo "No craco found"
        
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm install --legacy-peer-deps --force
        
    - name: Build web app
      working-directory: ./frontend
      run: |
        echo "=== Starting build ==="
        npm run build 2>&1 || (echo "Build failed" && exit 1)
        
    - name: Sync Capacitor
      working-directory: ./frontend
      run: npx cap sync android
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
        
    - name: Make gradlew executable
      run: chmod +x frontend/android/gradlew
      
    - name: Build Release AAB
      working-directory: ./frontend/android
      run: ./gradlew bundleRelease --no-daemon
        
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: frontend/android/app/build/outputs/bundle/release/*.aab
        if-no-files-found: warn
